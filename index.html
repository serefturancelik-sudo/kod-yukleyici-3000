<!DOCTYPE html>
<html>
<head>
    <title>Kod Yükleyici 3000</title>
</head>
<body>
    <h1>Kod Yükleyici 3000</h1>
    <button id="connectBtn">Porta Bağlan</button>
    <input type="text" id="commandInput" placeholder="Komut yaz...">
    <button id="sendBtn">Gönder</button>
    <div id="terminal" style="border:1px solid #000; height:200px; overflow-y:scroll;"></div>

    <script>
        let port;
        const terminal = document.getElementById('terminal');

        document.getElementById('connectBtn').addEventListener('click', async () => {
            // Seri port izin penceresini açar
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });
            terminal.innerHTML += "Bağlantı sağlandı.<br>";
            
            // Veri okuma döngüsü
            while (port.readable) {
                const reader = port.readable.getReader();
                try {
                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;
                        terminal.innerHTML += new TextDecoder().decode(value) + "<br>";
                    }
                } finally {
                    reader.releaseLock();
                }
            }
        });

        document.getElementById('sendBtn').addEventListener('click', async () => {
            const writer = port.writable.getWriter();
            const encoder = new TextEncoder();
            await writer.write(encoder.encode(document.getElementById('commandInput').value + "\n"));
            writer.releaseLock();
        });
    </script>
</body>
</html>
