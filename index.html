<select id="kartSec">
    <option value="esp32">ESP32 (WROOM)</option>
    <option value="arduino_uno">Arduino Uno</option>
    <option value="atmega328pb">ATmega 328PB</option>
</select>

<button id="baglanBtn">Bağlan & Eşle</button>
<div id="durum">Durum: Bekliyor...</div>

<button onclick="setMode('text')">Python/C++</button>
<button onclick="setMode('blockly')">mBlock (Blok)</button>

<div id="terminal" style="background:black; color:lime; height:300px; overflow-y:scroll;"></div>

<script>
    // 1. Kart eşleme mantığı
    document.getElementById('baglanBtn').onclick = async () => {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        document.getElementById('durum').innerText = "Bağlandı ve Eşlendi!";
        // TX/RX işlemleri burada başlayacak
    };

    // 2. Mod değiştirme (Blok veya Kod)
    function setMode(mode) {
        console.log(mode + " moduna geçildi.");
        // Burada blok editörünü veya metin editörünü aktif edeceksin
    }
</script>
